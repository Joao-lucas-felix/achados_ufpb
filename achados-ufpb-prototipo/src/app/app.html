<div
  class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(244,201,93,0.14),_transparent_28%),radial-gradient(circle_at_85%_10%,_rgba(241,143,75,0.12),_transparent_22%),linear-gradient(180deg,_#120d0b_0%,_#1d1511_40%,_#221814_100%)]"
>
  <header class="sticky top-0 z-20 mx-auto flex w-[min(1120px,calc(100%-1.5rem))] flex-col items-start justify-between gap-4 py-4 md:flex-row md:items-center">
    <a routerLink="/" class="flex items-center gap-3 text-inherit no-underline">
      <span
        class="grid h-11 w-11 place-items-center rounded-2xl bg-gradient-to-br from-[#f4c95d] to-[#f28f3b] font-black text-[#1b130f]"
        >U</span
      >
      <span class="grid">
        <strong class="text-[0.96rem]">Achados UFPB</strong>
        <small class="text-xs text-[rgba(247,239,229,0.68)]">Prototipo Angular para apresentacao</small>
      </span>
    </a>

    <nav class="flex w-full flex-wrap gap-2 overflow-x-auto md:w-auto">
      <a
        routerLink="/"
        routerLinkActive="bg-[rgba(247,239,229,0.08)] text-[#fff8f2]"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-full px-4 py-3 text-[rgba(247,239,229,0.8)] no-underline transition duration-200 hover:bg-[rgba(247,239,229,0.08)] hover:text-[#fff8f2]"
        >Inicio</a
      >
      <a
        routerLink="/catalogo"
        routerLinkActive="bg-[rgba(247,239,229,0.08)] text-[#fff8f2]"
        class="rounded-full px-4 py-3 text-[rgba(247,239,229,0.8)] no-underline transition duration-200 hover:bg-[rgba(247,239,229,0.08)] hover:text-[#fff8f2]"
        >Catalogo</a
      >
      <a
        routerLink="/fluxo"
        routerLinkActive="bg-[rgba(247,239,229,0.08)] text-[#fff8f2]"
        class="rounded-full px-4 py-3 text-[rgba(247,239,229,0.8)] no-underline transition duration-200 hover:bg-[rgba(247,239,229,0.08)] hover:text-[#fff8f2]"
        >Fluxo</a
      >
    </nav>
  </header>

  <main class="mx-auto w-[min(1120px,calc(100%-1.5rem))] pb-16">
    <router-outlet />
  </main>
</div>
