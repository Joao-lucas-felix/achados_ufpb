services:
  db:
    image: postgres:15
    container_name: postgres_achados
    restart: always
    environment:
      POSTGRES_DB: achados_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: django_achados
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/code
      - media_data:/code/media   
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:   
